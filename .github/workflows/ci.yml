name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  deployments: read
  statuses: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Verify
        run: npm run verify

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: verify

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Build
        run: npm run build

      - name: Run Playwright tests
        run: npm run test:e2e

      - name: Lighthouse on Vercel Preview
        run: npm run lh:ci
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LH_PREVIEW_MAX_WAIT_MS: 300000
          LH_PREVIEW_POLL_MS: 10000
