changelog:
  exclude:
    authors:
      - github-actions[bot]
  categories:
    - title: 🚀 Features
      labels:
        - feature
        - enhancement
    - title: 🐛 Fixes
      labels:
        - fix
        - bug
    - title: 🧪 Testing & CI
      labels:
        - test
        - ci
    - title: ♻️ Refactoring & Maintenance
      labels:
        - chore
        - refactor
        - maintenance
    - title: 📝 Content & Docs
      labels:
        - content
        - docs
        - blog
